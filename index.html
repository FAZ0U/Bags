<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#0f0f1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://faz0u.github.io/Trading-Bags/StoreLogo.scale-400.png">
    <title>Trading Bags Pro</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        :root{--bg-primary:#0f0f1a;--bg-card:rgba(255,255,255,0.08);--bg-input:rgba(255,255,255,0.15);--text-primary:#eef;--text-secondary:#889;--text-accent:#ffd89b;--positive:#96c93d;--negative:#ff8a7a;}
        body{font-family:sans-serif;background:var(--bg-primary);padding:16px;color:var(--text-primary);}
        .container{max-width:800px;margin:0 auto;}
        .header{text-align:center;margin-bottom:24px;position:relative;}
        .header h1{font-size:1.8rem;background:linear-gradient(135deg,#ffd89b,#c7e9fb);-webkit-background-clip:text;background-clip:text;color:transparent;}
        .theme-toggle{position:absolute;top:0;right:0;background:var(--bg-card);border:1px solid rgba(255,255,255,0.1);border-radius:40px;padding:8px 12px;cursor:pointer;}
        .control-panel{background:var(--bg-card);border-radius:24px;padding:16px;margin-bottom:20px;}
        .control-row{display:flex;gap:12px;flex-wrap:wrap;}
        .control-item{flex:1;background:rgba(0,0,0,0.3);padding:10px;border-radius:16px;display:flex;justify-content:space-between;}
        .control-item label{color:var(--text-accent);}
        .control-item input{background:var(--bg-input);border:none;padding:8px;border-radius:12px;color:white;width:85px;text-align:center;}
        .add-item-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;}
        .add-item-row input{flex:1;background:var(--bg-input);border:none;padding:10px;border-radius:14px;color:white;}
        .btn-add{background:linear-gradient(135deg,#00b09b,#96c93d);border:none;padding:10px 20px;border-radius:14px;color:white;font-weight:bold;cursor:pointer;}
        .btn-simulator{background:linear-gradient(135deg,#667eea,#764ba2);border:none;padding:12px;border-radius:14px;color:white;font-weight:bold;cursor:pointer;width:100%;margin-top:12px;}
        .data-management{background:rgba(0,0,0,0.25);border-radius:20px;padding:12px;margin-top:12px;}
        .data-buttons{display:flex;gap:10px;flex-wrap:wrap;}
        .btn-data{flex:1;background:rgba(100,100,150,0.4);border:1px solid rgba(255,255,255,0.1);padding:10px;border-radius:14px;color:white;cursor:pointer;}
        .stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px;}
        .stat-card{background:var(--bg-card);border-radius:20px;padding:14px;text-align:center;}
        .items-container{display:flex;flex-direction:column;gap:14px;}
        .item-card{background:var(--bg-card);border-radius:20px;padding:14px;}
        .item-header{display:flex;justify-content:space-between;margin-bottom:12px;}
        .item-name{font-size:1.2rem;font-weight:bold;color:var(--text-accent);}
        .item-fields{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
        .field{background:rgba(0,0,0,0.2);padding:8px;border-radius:14px;}
        .field input{background:transparent;border:none;color:white;font-size:1rem;width:100%;}
        .item-results{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;background:rgba(0,0,0,0.2);padding:10px;border-radius:16px;}
        .result{text-align:center;}
        .positive{color:var(--positive);}
        .negative{color:var(--negative);}
        .delete-btn{background:rgba(255,80,80,0.3);border:none;padding:8px;border-radius:40px;color:white;cursor:pointer;}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:1000;padding:20px;}
        .modal.active{display:flex;align-items:center;justify-content:center;}
        .modal-content{background:#1a1a2e;border-radius:28px;max-width:700px;width:100%;max-height:90vh;overflow-y:auto;padding:20px;}
        .modal-header{display:flex;justify-content:space-between;margin-bottom:20px;}
        .close-modal{background:rgba(255,80,80,0.5);border:none;padding:8px 16px;border-radius:40px;color:white;cursor:pointer;}
        .global-qty-section{background:rgba(102,126,234,0.2);border-radius:16px;padding:12px;margin-bottom:20px;display:flex;justify-content:space-between;flex-wrap:wrap;}
        .sim-item{background:var(--bg-card);border-radius:16px;padding:12px;margin-bottom:12px;}
        .sim-item-header{display:flex;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;}
        .sim-item-control{display:flex;gap:8px;}
        .sim-item-control input{background:var(--bg-input);border:none;padding:8px;border-radius:12px;color:white;width:70px;text-align:center;}
        .sim-item-control button{background:rgba(100,100,200,0.3);border:none;padding:6px 14px;border-radius:12px;color:white;cursor:pointer;}
        .sim-total{margin-top:20px;padding:16px;background:rgba(0,176,155,0.2);border-radius:20px;text-align:center;}
        .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#96c93d;color:white;padding:10px 20px;border-radius:40px;animation:fadeOut 2s forwards;}
        @keyframes fadeOut{0%{opacity:1}100%{opacity:0;visibility:hidden}}
        footer{text-align:center;margin-top:20px;color:#668;font-size:0.7rem;}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎒 Trading Bags Pro</h1>
            <p>Instala como app | Guardado automático</p>
            <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
        </div>
        <div class="control-panel">
            <div class="control-row">
                <div class="control-item"><label>💰 Impuesto</label><input type="number" id="taxRate" step="0.1" value="10.5">%</div>
                <div class="control-item"><label>⚠️ Pérdidas</label><input type="number" id="lossRate" step="0.1" value="7.5">%</div>
            </div>
            <div class="add-item-row">
                <input type="text" id="newName" placeholder="Nombre">
                <input type="number" id="newBuy" placeholder="Compra">
                <input type="number" id="newSell" placeholder="Venta">
                <button class="btn-add" onclick="addItem()">+ Agregar</button>
            </div>
            <div class="data-management">
                <div class="data-buttons">
                    <button class="btn-data" onclick="saveToLocal()">💾 Guardar</button>
                    <button class="btn-data" onclick="exportData()">📤 Exportar</button>
                    <button class="btn-data" onclick="document.getElementById('importFile').click()">📥 Importar</button>
                    <button class="btn-data" onclick="resetToDefault()">🔄 Restaurar</button>
                </div>
                <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(this)">
            </div>
            <button class="btn-simulator" onclick="openSimulator()">📊 SIMULADOR AVANZADO</button>
        </div>
        <div class="stats-grid" id="statsGrid"></div>
        <div class="items-container" id="itemsContainer"></div>
        <footer>Para instalar: menú Chrome → "Agregar a pantalla de inicio"</footer>
    </div>
    <div id="simulatorModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h2>📊 Simulador</h2><button class="close-modal" onclick="closeSimulator()">✖ Cerrar</button></div>
            <div class="global-qty-section">
                <label><input type="checkbox" id="globalQtyToggle"> 🔗 Aplicar a todos</label>
                <div><input type="number" id="globalQtyValue" value="50" disabled><button id="applyGlobalQty" onclick="applyGlobalQuantity()" disabled>Aplicar</button></div>
            </div>
            <div id="simulatorItems"></div>
            <div class="sim-total"><h3 id="totalGanancia">0 silver</h3><p id="totalInversion"></p><button class="btn-reset" onclick="resetQuantities()">🔄 Resetear</button></div>
        </div>
    </div>
    <script>
        const defaultItems=[{name:"Bolsa T5",buy:10148,sell:17726},{name:"Bolsa T5.1",buy:21076,sell:28941},{name:"Visión T6.1",buy:78588,sell:104829},{name:"Visión T5.0",buy:37119,sell:48730},{name:"Bolsa T6.1",buy:75780,sell:98981},{name:"Visión T4.0",buy:28014,sell:36507}];
        let items=[],simulatorQuantities={};
        function saveToLocal(){localStorage.setItem('tradingBagsData',JSON.stringify({items,taxRate:getTaxRate()*100,lossRate:getLossRate()*100}));showToast('✅ Guardado');}
        function loadFromLocal(){const s=localStorage.getItem('tradingBagsData');if(s){const d=JSON.parse(s);items=d.items;document.getElementById('taxRate').value=d.taxRate;document.getElementById('lossRate').value=d.lossRate;}else items=JSON.parse(JSON.stringify(defaultItems));initQuantities();renderItems();}
        function resetToDefault(){if(confirm('¿Restaurar datos originales?')){items=JSON.parse(JSON.stringify(defaultItems));document.getElementById('taxRate').value=10.5;document.getElementById('lossRate').value=7.5;initQuantities();renderItems();saveToLocal();showToast('🔄 Restaurado');}}
        function exportData(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify({items,taxRate:getTaxRate()*100,lossRate:getLossRate()*100})],{type:'application/json'}));a.download=`trading_bags_${Date.now()}.json`;a.click();showToast('💾 Exportado');}
        function importData(input){const f=input.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{const d=JSON.parse(e.target.result);if(d.items){items=d.items;if(d.taxRate)document.getElementById('taxRate').value=d.taxRate;if(d.lossRate)document.getElementById('lossRate').value=d.lossRate;initQuantities();renderItems();saveToLocal();showToast('📂 Importado');}};r.readAsText(f);input.value='';}
        function showToast(m){const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2000);}
        function initQuantities(){items.forEach(i=>{if(simulatorQuantities[i.name]===undefined)simulatorQuantities[i.name]=0;});}
        function getTaxRate(){return parseFloat(document.getElementById('taxRate').value)/100;}
        function getLossRate(){return parseFloat(document.getElementById('lossRate').value)/100;}
        function calculateItem(i){const tax=getTaxRate(),loss=getLossRate(),f=1-tax,ingreso=i.sell*f,imp=i.sell*tax,utilBruta=ingreso-i.buy,perdida=utilBruta*loss,utilNeta=utilBruta-perdida,rent=(utilNeta/i.buy)*100,precioMin=i.buy/f;return{ingresoNeto:ingreso,impuesto:imp,utilidadBruta:utilBruta,perdidaVarias:perdida,utilidadNeta:utilNeta,rentabilidad:rent,precioMinimo:precioMin};}
        function calculateAll(){return items.map(i=>({...i,...calculateItem(i)}));}
        function renderStats(d){if(!d.length){document.getElementById('statsGrid').innerHTML='<div class="stat-card"><h4>Sin datos</h4></div>';return;}const bestRent=[...d].sort((a,b)=>b.rentabilidad-a.rentabilidad)[0],bestUtil=[...d].sort((a,b)=>b.utilidadNeta-a.utilidadNeta)[0],bestEfi=[...d].sort((a,b)=>b.eficiencia-b.eficiencia)[0],total=d.reduce((s,i)=>s+i.utilidadNeta,0);document.getElementById('statsGrid').innerHTML=`<div class="stat-card"><h4>🏆 Mejor Rentabilidad</h4><div class="value">${bestRent.name}</div><div>${bestRent.rentabilidad.toFixed(2)}%</div></div><div class="stat-card"><h4>💰 Mayor Utilidad</h4><div class="value">${bestUtil.name}</div><div>${Math.round(bestUtil.utilidadNeta).toLocaleString()}</div></div><div class="stat-card"><h4>⚡ Eficiencia</h4><div class="value">${bestEfi.name}</div><div>${bestEfi.eficiencia.toFixed(0)}</div></div><div class="stat-card"><h4>📊 Ganancia Total</h4><div class="value">${Math.round(total).toLocaleString()}</div><div>silver/unidad</div></div>`;}
        function renderItems(){const data=calculateAll(),sorted=[...data].sort((a,b)=>b.rentabilidad-a.rentabilidad),container=document.getElementById('itemsContainer');if(!sorted.length){container.innerHTML='<div class="item-card" style="text-align:center">✨ Agrega objetos</div>';return;}container.innerHTML=sorted.map((item,idx)=>{let badge=idx===0?'🥇':idx===1?'🥈':idx===2?'🥉':'';return`<div class="item-card"><div class="item-header"><div class="item-name">${badge} ${item.name}</div><button class="delete-btn" onclick="deleteItem('${item.name}')">🗑️</button></div><div class="item-fields"><div class="field"><label>💰 Compra</label><input type="number" value="${item.buy}" onchange="updateItem('${item.name}','buy',this.value)"></div><div class="field"><label>💵 Venta</label><input type="number" value="${item.sell}" onchange="updateItem('${item.name}','sell',this.value)"></div></div><div class="item-results"><div class="result"><div class="label">📥 Ingreso Neto</div><div class="number">${Math.round(item.ingresoNeto).toLocaleString()}</div></div><div class="result"><div class="label">📊 Utilidad Neta</div><div class="number positive">${Math.round(item.utilidadNeta).toLocaleString()}</div></div><div class="result"><div class="label">📈 Rentabilidad</div><div class="number positive">${item.rentabilidad.toFixed(2)}%</div></div><div class="result"><div class="label">🎯 Precio Mínimo</div><div class="number">${Math.round(item.precioMinimo).toLocaleString()}</div></div></div></div>`;}).join('');renderStats(data);saveToLocal();}
        function updateItem(name,field,val){const i=items.find(x=>x.name===name);if(i){const n=parseFloat(val);if(!isNaN(n)&&n>=0){i[field]=n;renderItems();if(document.getElementById('simulatorModal').classList.contains('active'))renderSimulator();}}}
        function deleteItem(name){items=items.filter(i=>i.name!==name);delete simulatorQuantities[name];renderItems();if(document.getElementById('simulatorModal').classList.contains('active'))renderSimulator();}
        function addItem(){const n=document.getElementById('newName').value.trim(),b=parseFloat(document.getElementById('newBuy').value),s=parseFloat(document.getElementById('newSell').value);if(!n){alert('Nombre requerido');return;}if(isNaN(b)||b<=0){alert('Compra válida');return;}if(isNaN(s)||s<=0){alert('Venta válida');return;}items.push({name:n,buy:b,sell:s});simulatorQuantities[n]=0;document.getElementById('newName').value='';document.getElementById('newBuy').value='';document.getElementById('newSell').value='';renderItems();showToast(`✅ ${n} agregado`);}
        function renderSimulator(){const data=calculateAll(),container=document.getElementById('simulatorItems');if(!data.length){container.innerHTML='<div style="text-align:center">No hay objetos</div>';return;}data.forEach(i=>{if(simulatorQuantities[i.name]===undefined)simulatorQuantities[i.name]=0;});container.innerHTML=data.map(i=>{const q=simulatorQuantities[i.name]||0;return`<div class="sim-item"><div class="sim-item-header"><span>${i.name}</span><div class="sim-item-control"><button onclick="changeQuantity('${i.name}',-1)">-</button><input type="number" value="${q}" onchange="setQuantity('${i.name}',this.value)" min="0"><button onclick="changeQuantity('${i.name}',1)">+</button></div></div><div class="sim-item-stats"><div>💰 Utilidad/unidad: ${Math.round(i.utilidadNeta).toLocaleString()}</div><div>📊 Ganancia: ${Math.round(i.utilidadNeta*q).toLocaleString()}</div><div>💵 Inversión: ${Math.round(i.buy*q).toLocaleString()}</div></div></div>`;}).join('');updateSimTotal(data);}
        function updateSimTotal(data){let g=0,inv=0;data.forEach(i=>{const q=simulatorQuantities[i.name]||0;g+=i.utilidadNeta*q;inv+=i.buy*q;});document.getElementById('totalGanancia').innerHTML=`${Math.round(g).toLocaleString()} silver`;document.getElementById('totalInversion').innerHTML=`Inversión: ${Math.round(inv).toLocaleString()} silver | Rentabilidad: ${inv>0?((g/inv)*100).toFixed(2):0}%`;}
        function changeQuantity(n,d){simulatorQuantities[n]=Math.max(0,(simulatorQuantities[n]||0)+d);renderSimulator();}
        function setQuantity(n,v){let q=parseInt(v);if(isNaN(q)||q<0)q=0;simulatorQuantities[n]=q;renderSimulator();}
        function resetQuantities(){Object.keys(simulatorQuantities).forEach(k=>simulatorQuantities[k]=0);renderSimulator();showToast('🔄 Cantidades reiniciadas');}
        function applyGlobalQuantity(){const toggle=document.getElementById('globalQtyToggle');if(!toggle.checked)return;const qty=parseInt(document.getElementById('globalQtyValue').value);if(isNaN(qty)||qty<0){alert('Cantidad válida');return;}Object.keys(simulatorQuantities).forEach(k=>simulatorQuantities[k]=qty);renderSimulator();showToast(`🔗 ${qty} aplicado a todos`);}
        function openSimulator(){initQuantities();renderSimulator();document.getElementById('simulatorModal').classList.add('active');}
        function closeSimulator(){document.getElementById('simulatorModal').classList.remove('active');}
        function toggleTheme(){document.body.classList.toggle('light');saveToLocal();}
        document.getElementById('taxRate').oninput=()=>{renderItems();if(document.getElementById('simulatorModal').classList.contains('active'))renderSimulator();};
        document.getElementById('lossRate').oninput=()=>{renderItems();if(document.getElementById('simulatorModal').classList.contains('active'))renderSimulator();};
        const toggle=document.getElementById('globalQtyToggle'),input=document.getElementById('globalQtyValue'),btn=document.getElementById('applyGlobalQty');
        toggle.onchange=()=>{input.disabled=!toggle.checked;btn.disabled=!toggle.checked;};
        loadFromLocal();
    </script>
</body>
</html>
